provider = "openai"
api_key_env = "OPENAI_API_KEY"
model = "gpt-5-nano"
max_parallel_agents = 32
max_parallel_llm_requests = 64
max_agent_steps = 128
initial_context_token_budget = 24000


[[test]]
id = "fail-meter-empty-label"
severity = "critical"
instruction = "Inspect `meter_bad_empty_label`. Fail if its body calls `meter_item` directly instead of `meter_ok`."

[[test]]
id = "fail-meter-open-scale"
severity = "high"
instruction = "Inspect `meter_bad_open_scale`. Fail if its body contains `signal.value * 100` or any direct multiplication of `signal.value`."

[[test]]
id = "fail-meter-paused-name"
severity = "medium"
instruction = "Inspect `meter_bad_paused_name`. Fail if the `name == \"paused\"` branch returns `Some(...)`."

[[test]]
id = "fail-meter-short-key"
severity = "high"
instruction = "Inspect `meter_bad_short_key`. Fail if the `format!` call uses `normalize_name(&signal.name)` while omitting `signal.label`."

[[test]]
id = "fail-row-group-skip"
severity = "critical"
instruction = "Inspect `row_bad_group_skip`. Fail if its body returns `Some(format!(...))` without any `row_ok` call."

[[test]]
id = "fail-row-plain-zone"
severity = "high"
instruction = "Inspect `row_bad_plain_zone`. Fail if its `format!` call uses `record.zone` directly."

[[test]]
id = "fail-row-closed-item"
severity = "medium"
instruction = "Inspect `row_bad_closed_item`. Fail if its body returns `Some(format!(...))` after checking only `same_group` and not `record.open`."

[[test]]
id = "fail-gate-missing-label"
severity = "critical"
instruction = "Inspect `gate_bad_missing_label`. Fail if `decision.open` becomes true without `label_present(request)`."

[[test]]
id = "fail-gate-single-stamp"
severity = "high"
instruction = "Inspect `gate_bad_single_stamp`. Fail if it opens on `stamp_count >= 1`."

[[test]]
id = "fail-gate-open-limit"
severity = "high"
instruction = "Inspect `gate_bad_open_limit`. Fail if it opens without an amount limit comparison."

