provider = "openai"
model = "gpt-4o-mini"
api_key_env = "OPENAI_API_KEY"
max_parallel_agents = 4
max_parallel_llm_requests = 4

[[test]]
id = "ops-platform-secret-logging"
severity = "high"
instruction = "Review the ops platform for secret leakage in logs, including tokens, API keys, authorization headers, and cookies. First call search_text with query authorization, read the matched file, then return failed with concrete evidence if secrets are logged; otherwise return passed."

[[test]]
id = "ops-platform-sql-injection"
severity = "critical"
instruction = "Review the ops platform for SQL injection caused by string interpolation, template literals, format strings, or concatenation in SQL queries. First call search_text with query select, read the matched file, then return failed with concrete evidence if user-controlled values are interpolated into SQL; otherwise return passed."

[[test]]
id = "ops-platform-missing-authorization"
severity = "critical"
instruction = "Review request handlers for missing authorization on account_id, org_id, project_id, user_id, or similar scoped identifiers. First call search_text with query account_id, read the matched file, then return failed with concrete evidence if handlers trust scoped identifiers without checking ownership or permission; otherwise return passed."

[[test]]
id = "ops-platform-cache-stampede"
severity = "medium"
instruction = "Review the ops platform for cache stampede risk where an expensive fetch happens on cache miss without single-flight, request coalescing, locking, or another in-flight guard. First call search_text with query cache, read the matched file, then return failed with concrete evidence if you find this pattern; otherwise return passed."
