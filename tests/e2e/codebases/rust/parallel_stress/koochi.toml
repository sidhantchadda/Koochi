provider = "openai"
api_key_env = "OPENAI_API_KEY"
model = "gpt-5-nano"
max_parallel_agents = 50
max_parallel_llm_requests = 50
max_agent_steps = 128
initial_context_token_budget = 24000

[[test]]
id = "fail-analytics-tenant-bypass"
severity = "critical"
instruction = "Analytics findings must not be emitted for requests without tenant isolation. Fail if a changed analytics rule can score or emit findings without requiring tenant identity, with concrete evidence."

[[test]]
id = "fail-analytics-unbounded-score"
severity = "high"
instruction = "Analytics scoring must clamp or bound raw signal values before amplification. Fail if changed code multiplies or uses raw scores without a bound, with concrete evidence."

[[test]]
id = "fail-analytics-disabled-signal"
severity = "medium"
instruction = "Disabled analytics signals must not generate findings. Fail if changed code can emit findings for disabled signals, with concrete evidence."

[[test]]
id = "fail-analytics-global-cache-key"
severity = "high"
instruction = "Analytics cache keys must include tenant identity. Fail if changed code builds a reusable key from only signal name or global data, with concrete evidence."

[[test]]
id = "fail-compliance-tenant-leak"
severity = "critical"
instruction = "Compliance exports must filter rows by tenant. Fail if changed export code can return another tenant's record, with concrete evidence."

[[test]]
id = "fail-compliance-unsanitized-csv"
severity = "high"
instruction = "Compliance CSV exports must sanitize commas and newlines before formatting rows. Fail if changed export code writes raw CSV cells, with concrete evidence."

[[test]]
id = "fail-compliance-disabled-policy"
severity = "medium"
instruction = "Compliance exports must omit disabled policies. Fail if changed code exports disabled policies, with concrete evidence."

[[test]]
id = "fail-workflow-missing-tenant"
severity = "critical"
instruction = "Workflow approval routes must check tenant and actor identity before approval. Fail if changed workflow code can approve without tenant presence, with concrete evidence."

[[test]]
id = "fail-workflow-single-approver"
severity = "high"
instruction = "High-value workflow approvals must require at least two approvals. Fail if changed workflow code accepts a single approver, with concrete evidence."

[[test]]
id = "fail-workflow-unbounded-amount"
severity = "high"
instruction = "Workflow approval routes must have an amount ceiling. Fail if changed workflow code approves any amount once basic approvals exist, with concrete evidence."

