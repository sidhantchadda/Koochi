provider = "openai"
api_key_env = "OPENAI_API_KEY"
model = "gpt-5-nano"
max_parallel_agents = 128
max_parallel_llm_requests = 256
max_agent_steps = 128
initial_context_token_budget = 24000

[[test]]
id = "fail-analytics-tenant-bypass"
severity = "critical"
instruction = "Analytics findings must require tenant isolation. Fail if analytics scoring or emission can proceed without tenant identity; pass only when the matching code is tenant scoped."

[[test]]
id = "fail-analytics-unbounded-score"
severity = "high"
instruction = "Analytics scoring must clamp or bound raw signal values before amplification. Fail if raw signal scores can be multiplied or used without a bound."

[[test]]
id = "fail-analytics-disabled-signal"
severity = "medium"
instruction = "Disabled analytics signals must not generate findings. Fail if disabled signals can still emit analytics findings."

[[test]]
id = "fail-analytics-global-cache-key"
severity = "high"
instruction = "Analytics cache keys must include tenant identity. Fail if a reusable cache key is built from only signal name or global data."

[[test]]
id = "fail-compliance-tenant-leak"
severity = "critical"
instruction = "Compliance exports must filter rows by tenant. Fail if export code can return another tenant's record."

[[test]]
id = "fail-compliance-unsanitized-csv"
severity = "high"
instruction = "Compliance CSV exports must sanitize commas and newlines before formatting rows. Fail if raw CSV cells are written."

[[test]]
id = "fail-compliance-disabled-policy"
severity = "medium"
instruction = "Compliance exports must omit disabled policies. Fail if disabled policies are exported."

[[test]]
id = "fail-workflow-missing-tenant"
severity = "critical"
instruction = "Workflow approval routes must check tenant and actor identity before approval. Fail if approval can proceed without tenant presence."

[[test]]
id = "fail-workflow-single-approver"
severity = "high"
instruction = "High-value workflow approvals must require at least two approvals. Fail if a single approver can approve a high-value workflow."

[[test]]
id = "fail-workflow-unbounded-amount"
severity = "high"
instruction = "Workflow approval routes must enforce an amount ceiling. Fail if any amount can be approved once basic approvals exist."

[[test]]
id = "pass-analytics-rule-002"
severity = "medium"
instruction = "Analytics rule 002 should require tenant identity, ignore disabled signals, clamp score inputs, and emit only tenant-scoped findings. Pass when the matching safe implementation demonstrates those properties."

